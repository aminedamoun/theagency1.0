<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dubai Prod Agent</title>
    <link rel="stylesheet" href="/static/css/platform.css?v=7">
</head>
<body>
    <!-- Sidebar -->
    <nav class="sidebar" id="sidebar">
        <div class="sidebar-brand" onclick="window.location='/spaces'" style="cursor:pointer;text-decoration:none;">
            <div class="brand-logo">DP</div>
            <div class="brand-text">
                <h1>DUBAI PROD</h1>
                <span>Agency Platform</span>
            </div>
        </div>

        <div class="sidebar-nav">
            <a class="nav-item active" data-page="dashboard" onclick="navigateTo('dashboard')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Dashboard</span>
            </a>
            <a class="nav-item" data-page="clients" onclick="navigateTo('clients')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
                <span>Clients</span>
            </a>
            <a class="nav-item" data-page="content" onclick="navigateTo('content')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
                <span>Content Studio</span>
            </a>
            <a class="nav-item" data-page="design" onclick="navigateTo('design')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
                <span>Design Studio</span>
            </a>
            <a class="nav-item" data-page="video" onclick="navigateTo('video')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
                <span>Video Studio</span>
            </a>
            <a class="nav-item" data-page="media" onclick="navigateTo('media')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z"/></svg>
                <span>Media Library</span>
            </a>
            <a class="nav-item" data-page="social" onclick="navigateTo('social')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><rect x="2" y="2" width="20" height="20" rx="5"/><path d="M16 11.37A4 4 0 1112.63 8 4 4 0 0116 11.37z"/><line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/></svg>
                <span>Social Media</span>
            </a>
            <a class="nav-item" data-page="research" onclick="navigateTo('research')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <span>Research & Sales</span>
            </a>
            <a class="nav-item" data-page="pipeline" onclick="navigateTo('pipeline')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><polyline points="1 4 1 10 7 10"/><polyline points="23 20 23 14 17 14"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15"/></svg>
                <span>All Tasks</span>
            </a>
            <a class="nav-item" data-page="leads" onclick="navigateTo('leads')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="8.5" cy="7" r="4"/><line x1="20" y1="8" x2="20" y2="14"/><line x1="23" y1="11" x2="17" y2="11"/></svg>
                <span>Leads CRM</span>
            </a>
            <a class="nav-item" data-page="inbox" onclick="navigateTo('inbox')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>
                <span>Inbox</span>
            </a>
            <a class="nav-item" data-page="chat" onclick="navigateTo('chat')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                <span>Agent Chat</span>
            </a>
        </div>

        <div class="sidebar-footer">
            <a class="nav-item" data-page="settings" onclick="navigateTo('settings')">
                <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"/></svg>
                <span>Settings</span>
            </a>
            <div class="sidebar-status">
                <div class="status-dot"></div>
                <span>All agents online</span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="main-content" id="mainContent">
        <!-- Pages loaded dynamically -->
    </main>

    <!-- Persistent chat panels (survive page navigation) -->
    <div class="of-chat-panel" id="ofChatPanel" style="display:none">
        <div class="of-chat-header" id="ofChatHeader"></div>
        <div class="of-chat-messages" id="ofChatMessages"></div>
        <div class="of-chat-input-row">
            <button class="of-mic-btn" id="ofMicBtn" onclick="ofToggleMic('ofChatInput','agent')" title="Hold to speak">🎤</button>
            <input type="text" id="ofChatInput" class="of-chat-input" placeholder="Type or hold mic to speak..." onkeydown="if(event.key==='Enter')ofSendChat()">
            <button class="of-send-btn" onclick="ofSendChat()">Send</button>
        </div>
    </div>

    <div class="of-meeting-panel" id="ofMeetingPanel" style="display:none">
        <div class="of-meeting-header" id="ofMeetingHeader">
            <div><strong>🏢 Team Meeting Room</strong><div style="font-size:11px;color:var(--text-muted)">All agents — discuss, brainstorm, assign</div></div>
            <div style="display:flex;gap:4px;align-items:center">
                <button class="of-voice-btn ${voiceEnabled?'of-voice-on':''}" onclick="ofToggleVoice()" id="ofMeetingVoiceToggle">
                    ${voiceEnabled ? '🔊' : '🔇'}
                </button>
                <button class="of-clear-btn" onclick="ofClearMeeting()" title="Clear history">Clear</button>
                <button class="of-close-btn" onclick="closeMeeting()">✕</button>
            </div>
        </div>
        <div class="of-meeting-agents" id="ofMeetingAgentsRow"></div>
        <div class="of-chat-messages" id="ofMeetingMessages"></div>
        <div class="of-chat-input-row">
            <button class="of-mic-btn" id="ofMeetingMicBtn" onclick="ofToggleMic('ofMeetingInput','meeting')" title="Hold to speak">🎤</button>
            <input type="text" id="ofMeetingInput" class="of-chat-input" placeholder="Type or hold mic to speak..." onkeydown="if(event.key==='Enter')ofSendMeeting()">
            <button class="of-send-btn" onclick="ofSendMeeting()">Send</button>
        </div>
    </div>

    <script src="/static/js/platform.js"></script>
</body>
</html>
